# CI 流水线：每次 push / PR 自动跑 lint + 单测 + 生产构建
# 对应本地命令：pnpm lint / pnpm test / pnpm build（三步全绿才算通过）
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支只保留最新一次运行，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # CI 只做 lint/test/build，不打包 Electron——跳过 Electron 二进制下载(~150MB)，保持安装快
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # pnpm 版本由 package.json 的 packageManager 字段决定，这里不再重复指定（否则报版本冲突）
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node 22（启用 pnpm 缓存）
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖（锁定版本，开箱即用）
        run: pnpm install --frozen-lockfile

      - name: 代码规范检查
        run: pnpm lint

      - name: 单元测试
        run: pnpm test

      - name: 生产构建
        run: pnpm build
